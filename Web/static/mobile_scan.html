<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>SafeVault — Xác thực khuôn mặt</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    :root {
      --gold:       #D4AF37;
      --gold-light: #F5D76E;
      --gold-dim:   rgba(212,175,55,0.15);
      --bg:         #080808;
      --card:       #111111;
      --green:      #22c55e;
      --red:        #ef4444;
      --text:       #f0f0f0;
      --muted:      #666;
    }

    html, body {
      height: 100%; width: 100%;
      background: var(--bg);
      font-family: 'Inter', sans-serif;
      color: var(--text);
      overflow: hidden;
    }

    /* ── MAIN CONTAINER ── */
    .container {
      height: 100vh; width: 100%;
      display: flex; flex-direction: column;
      position: relative;
    }

    /* ── HEADER ── */
    .header {
      position: absolute; top: 0; left: 0; right: 0;
      z-index: 10;
      padding: 16px 20px 12px;
      background: linear-gradient(to bottom, rgba(8,8,8,0.95), transparent);
      display: flex; align-items: center; gap: 12px;
    }
    .logo-icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--gold), #9A7D0A);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
    }
    .logo-icon svg { width: 20px; height: 20px; color: #000; }
    .logo-text { font-size: 18px; font-weight: 700; color: var(--gold); }
    .logo-sub  { font-size: 11px; color: var(--muted); margin-top: 1px; }

    /* ── CAMERA VIEW ── */
    #camera-view {
      flex: 1; width: 100%; height: 100%;
      position: absolute; inset: 0;
      background: #000;
      object-fit: cover;
      transform: scaleX(-1); /* mirror for selfie */
    }

    /* ── OVERLAY ── */
    .overlay {
      position: absolute; inset: 0;
      pointer-events: none;
    }

    /* Face guide frame */
    .face-guide {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -58%);
      width: min(260px, 70vw);
      height: min(310px, 84vw);
      border-radius: 50% / 44%;
      border: 2.5px solid var(--gold);
      box-shadow: 0 0 0 4000px rgba(0,0,0,0.35);
      animation: pulse-border 2s ease-in-out infinite;
    }
    @keyframes pulse-border {
      0%, 100% { box-shadow: 0 0 0 4000px rgba(0,0,0,0.35), 0 0 20px rgba(212,175,55,0.3); }
      50%       { box-shadow: 0 0 0 4000px rgba(0,0,0,0.35), 0 0 40px rgba(212,175,55,0.6); }
    }

    /* Corner marks */
    .face-guide::before, .face-guide::after {
      content: ''; position: absolute;
      width: 24px; height: 24px;
      border-color: var(--gold-light);
      border-style: solid;
    }
    .face-guide::before { top: -3px; left: -3px; border-width: 3px 0 0 3px; border-radius: 4px 0 0 0; }
    .face-guide::after  { bottom: -3px; right: -3px; border-width: 0 3px 3px 0; border-radius: 0 0 4px 0; }

    /* Scan line animation */
    .scan-line {
      position: absolute;
      left: 8px; right: 8px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      animation: scan 2s ease-in-out infinite;
      top: 20%;
    }
    @keyframes scan {
      0%   { top: 15%; opacity: 1; }
      100% { top: 85%; opacity: 0.3; }
    }

    /* ── BOTTOM PANEL ── */
    .bottom-panel {
      position: absolute; bottom: 0; left: 0; right: 0;
      z-index: 10;
      padding: 20px 24px 36px;
      background: linear-gradient(to top, rgba(8,8,8,0.97) 70%, transparent);
    }

    /* Status */
    .status-box {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 20px;
    }
    .status-dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: var(--gold);
      flex-shrink: 0;
      animation: blink 1.5s ease-in-out infinite;
    }
    .status-dot.active { background: var(--gold); animation: blink 0.8s ease-in-out infinite; }
    .status-dot.success { background: var(--green); animation: none; }
    .status-dot.error   { background: var(--red);   animation: none; }
    .status-dot.idle    { background: var(--muted);  animation: none; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

    .status-text { font-size: 15px; font-weight: 500; line-height: 1.4; }
    .status-sub  { font-size: 12px; color: var(--muted); margin-top: 2px; }

    /* Capture button */
    #capture-btn {
      width: 100%;
      padding: 16px;
      border: none; border-radius: 14px;
      background: linear-gradient(135deg, var(--gold), #9A7D0A);
      color: #000;
      font-size: 16px; font-weight: 700;
      letter-spacing: 0.5px;
      cursor: pointer;
      display: none;
      align-items: center; justify-content: center; gap: 10px;
      transition: transform 0.15s, opacity 0.15s;
    }
    #capture-btn:active { transform: scale(0.97); opacity: 0.9; }
    #capture-btn.visible { display: flex; }

    /* Countdown ring */
    .countdown-wrap {
      display: none;
      align-items: center; justify-content: center;
      gap: 16px; margin-bottom: 8px;
    }
    .countdown-wrap.visible { display: flex; }
    .countdown-ring {
      width: 60px; height: 60px; position: relative;
    }
    .countdown-ring svg { transform: rotate(-90deg); }
    .countdown-ring .track { fill: none; stroke: #222; stroke-width: 4; }
    .countdown-ring .progress {
      fill: none; stroke: var(--gold); stroke-width: 4;
      stroke-linecap: round;
      stroke-dasharray: 163;
      stroke-dashoffset: 0;
      transition: stroke-dashoffset 1s linear;
    }
    .countdown-num {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; font-weight: 700; color: var(--gold);
    }
    .countdown-label { font-size: 13px; color: var(--muted); line-height: 1.5; }

    /* Result overlay */
    #result-overlay {
      position: absolute; inset: 0; z-index: 20;
      display: flex; align-items: center; justify-content: center;
      background: rgba(8,8,8,0.92);
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s;
    }
    #result-overlay.show { opacity: 1; pointer-events: all; }

    .result-card {
      text-align: center; padding: 40px 32px;
      border-radius: 20px; width: min(320px, 88vw);
      border: 1px solid #222;
    }
    .result-card.granted { background: rgba(34,197,94,0.08); border-color: rgba(34,197,94,0.3); }
    .result-card.denied  { background: rgba(239,68,68,0.08);  border-color: rgba(239,68,68,0.3);  }

    .result-icon { font-size: 56px; margin-bottom: 16px; }
    .result-title { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
    .result-title.granted { color: var(--green); }
    .result-title.denied  { color: var(--red);   }
    .result-name { font-size: 18px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
    .result-conf { font-size: 13px; color: var(--muted); margin-bottom: 6px; }
    .result-reason { font-size: 12px; color: var(--muted); margin-bottom: 24px; }

    .result-btn {
      padding: 12px 32px;
      border: 1px solid #333; border-radius: 10px;
      background: transparent; color: var(--text);
      font-size: 14px; font-weight: 500; cursor: pointer;
      transition: background 0.2s;
    }
    .result-btn:hover { background: #1a1a1a; }

    /* Waiting state */
    #waiting-screen {
      position: absolute; inset: 0; z-index: 15;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: var(--bg);
      transition: opacity 0.4s;
    }
    .waiting-vault {
      width: 80px; height: 80px;
      background: var(--gold-dim);
      border: 2px solid rgba(212,175,55,0.3);
      border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 24px;
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
    .waiting-vault svg { width: 40px; height: 40px; color: var(--gold); }
    .waiting-title { font-size: 20px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
    .waiting-sub   { font-size: 14px; color: var(--muted); text-align: center; max-width: 260px; line-height: 1.5; }
    .waiting-pulse {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--gold); margin: 24px auto 0;
      animation: blink 1.5s ease-in-out infinite;
    }

    canvas#snapshot { display: none; }
  </style>
</head>
<body>
<div class="container">

  <!-- Camera stream -->
  <video id="camera-view" autoplay playsinline muted></video>
  <canvas id="snapshot"></canvas>

  <!-- Header -->
  <div class="header">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <rect x="3" y="11" width="18" height="11" rx="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        <circle cx="12" cy="16" r="1.5" fill="currentColor"/>
      </svg>
    </div>
    <div>
      <div class="logo-text">SafeVault</div>
      <div class="logo-sub">Xác thực khuôn mặt</div>
    </div>
  </div>

  <!-- Waiting screen (hiển thị khi chưa có yêu cầu) -->
  <div id="waiting-screen">
    <div class="waiting-vault">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="11" width="18" height="11" rx="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        <circle cx="12" cy="16" r="1.5" fill="currentColor"/>
      </svg>
    </div>
    <div class="waiting-title">Đang chờ xác thực</div>
    <div class="waiting-sub">Nhập mã PIN trên bàn phím két sắt để bắt đầu quét khuôn mặt</div>
    <div class="waiting-pulse"></div>
  </div>

  <!-- Face guide overlay -->
  <div class="overlay" id="scan-overlay" style="display:none;">
    <div class="face-guide">
      <div class="scan-line"></div>
    </div>
  </div>

  <!-- Bottom panel -->
  <div class="bottom-panel">

    <!-- Countdown -->
    <div class="countdown-wrap" id="countdown-wrap">
      <div class="countdown-ring">
        <svg viewBox="0 0 56 56">
          <circle class="track"    cx="28" cy="28" r="24"/>
          <circle class="progress" id="cd-circle" cx="28" cy="28" r="24"
                  style="stroke-dasharray:150.8"/>
        </svg>
        <div class="countdown-num" id="cd-num">3</div>
      </div>
      <div class="countdown-label">
        Giữ mặt trong khung<br/>và chụp ảnh
      </div>
    </div>

    <!-- Status -->
    <div class="status-box">
      <div class="status-dot idle" id="status-dot"></div>
      <div>
        <div class="status-text" id="status-text">Chờ yêu cầu từ két sắt...</div>
        <div class="status-sub"  id="status-sub">Kết nối SSE đang thiết lập</div>
      </div>
    </div>

    <!-- Capture button -->
    <button id="capture-btn" onclick="captureAndSend()">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
        <circle cx="12" cy="13" r="4"/>
      </svg>
      Chụp & Xác thực
    </button>
  </div>

  <!-- Result overlay -->
  <div id="result-overlay">
    <div class="result-card" id="result-card">
      <div class="result-icon" id="result-icon">✅</div>
      <div class="result-title" id="result-title">Thành công</div>
      <div class="result-name"  id="result-name"></div>
      <div class="result-conf"  id="result-conf"></div>
      <div class="result-reason" id="result-reason"></div>
      <button class="result-btn" onclick="resetToWait()">← Quay lại</button>
    </div>
  </div>
</div>

<script>
// ──────────────────────────────────────────
//  STATE
// ──────────────────────────────────────────
let videoStream     = null;
let countdownTimer  = null;
let isScanning      = false;
let sseSource       = null;
let countdownSec    = 3;

// ──────────────────────────────────────────
//  INIT
// ──────────────────────────────────────────
document.addEventListener("DOMContentLoaded", () => {
  connectSSE();
  requestCamera(); // Khởi động camera ngay khi vào trang
  checkInitialStatus();
});

async function checkInitialStatus() {
  try {
    const res = await fetch("/status");
    const data = await res.json();
    if (data.waiting_for_face) {
      startScanMode();
    }
  } catch(e) {}
}

// ──────────────────────────────────────────
//  CAMERA
// ──────────────────────────────────────────
async function requestCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: "user" },
      audio: false
    });
    videoStream = stream;
    const video = document.getElementById("camera-view");
    video.srcObject = stream;
    setStatus("idle", "Sẵn sàng", "Camera đã bật — chờ yêu cầu từ két");
  } catch (err) {
    setStatus("error", "Không truy cập được camera", err.message);
    console.warn("[CAM]", err);
  }
}

// ──────────────────────────────────────────
//  SSE — Nhận yêu cầu quét mặt từ server
// ──────────────────────────────────────────
function connectSSE() {
  if (sseSource) sseSource.close();
  sseSource = new EventSource("/events");

  sseSource.addEventListener("connected", () => {
    setStatus("idle", "Đã kết nối server", "Chờ mã PIN nhập từ bàn phím");
  });

  // Khi STM32 gửi 'F' → Flask push face_request → trang này tự bắt đầu
  sseSource.addEventListener("face_request", (e) => {
    const data = JSON.parse(e.data);
    console.log("[SSE] face_request:", data);
    startScanMode();
  });

  // Kết quả từ server (nếu đang ở trang này)
  sseSource.addEventListener("recognize", (e) => {
    const data = JSON.parse(e.data);
    if (!isScanning) return;
    showResult(data.status, data.user || "Unknown", data.confidence || 0, data.reason || "");
  });

  sseSource.onerror = () => {
    setStatus("error", "Mất kết nối server", "Đang thử lại...");
    setTimeout(connectSSE, 3000);
  };
}

// ──────────────────────────────────────────
//  SCAN MODE — Bật khi nhận face_request
// ──────────────────────────────────────────
function startScanMode() {
  if (isScanning) return;
  isScanning = true;

  // Ẩn waiting screen, hiện camera + guide
  document.getElementById("waiting-screen").style.opacity = "0";
  setTimeout(() => { document.getElementById("waiting-screen").style.display = "none"; }, 400);
  document.getElementById("scan-overlay").style.display = "block";

  setStatus("active", "Đặt mặt vào khung hình", "Hệ thống đang sẵn sàng nhận dạng");

  // Bắt đầu đếm ngược 3 giây rồi tự động chụp
  startCountdown(3, () => captureAndSend());
}

// ──────────────────────────────────────────
//  COUNTDOWN
// ──────────────────────────────────────────
function startCountdown(seconds, onDone) {
  const wrap    = document.getElementById("countdown-wrap");
  const circle  = document.getElementById("cd-circle");
  const numEl   = document.getElementById("cd-num");
  const totalDash = 150.8; // 2π × r (r=24)

  wrap.classList.add("visible");
  let remaining = seconds;

  function tick() {
    numEl.textContent = remaining;
    circle.style.strokeDashoffset = totalDash * (1 - remaining / seconds);

    if (remaining <= 0) {
      clearInterval(countdownTimer);
      wrap.classList.remove("visible");
      onDone();
      return;
    }
    remaining--;
  }

  tick();
  countdownTimer = setInterval(tick, 1000);

  // Hiện nút chụp thủ công nếu muốn
  document.getElementById("capture-btn").classList.add("visible");
  setStatus("active", `Chụp sau ${seconds} giây`, "Giữ mặt trong khung sáng");
}

// ──────────────────────────────────────────
//  CHỤP ẢNH & GỬI LÊN SERVER
// ──────────────────────────────────────────
async function captureAndSend() {
  clearInterval(countdownTimer);
  document.getElementById("countdown-wrap").classList.remove("visible");
  document.getElementById("capture-btn").classList.remove("visible");

  setStatus("active", "Đang xử lý AI...", "Vui lòng đợi");

  const video  = document.getElementById("camera-view");
  const canvas = document.getElementById("snapshot");
  canvas.width  = video.videoWidth  || 640;
  canvas.height = video.videoHeight || 480;
  const ctx = canvas.getContext("2d");
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

  // Lấy base64 (mirror đã được CSS xử lý, lấy ảnh gốc)
  const b64 = canvas.toDataURL("image/jpeg", 0.85).split(",")[1];

  try {
    const res  = await fetch("/mobile/scan", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ image: b64 })
    });
    const data = await res.json();
    showResult(data.status, data.name, data.confidence, data.reason);
  } catch (err) {
    showResult("denied", "Lỗi kết nối", 0, err.message);
  }
}

// ──────────────────────────────────────────
//  HIỂN THỊ KẾT QUẢ
// ──────────────────────────────────────────
function showResult(status, name, confidence, reason) {
  isScanning = false;
  const overlay = document.getElementById("result-overlay");
  const card    = document.getElementById("result-card");

  document.getElementById("result-icon").textContent  = status === "granted" ? "✅" : "❌";
  document.getElementById("result-title").textContent = status === "granted" ? "Xác thực thành công!" : "Xác thực thất bại";
  document.getElementById("result-title").className   = `result-title ${status}`;
  document.getElementById("result-name").textContent  = status === "granted" ? `👤 ${name}` : "";
  document.getElementById("result-conf").textContent  = confidence > 0 ? `Độ tin cậy: ${confidence}%` : "";
  document.getElementById("result-reason").textContent = reason || "";
  card.className = `result-card ${status}`;

  overlay.classList.add("show");

  // Chuyển hướng về trang chủ sau 3 giây (kể cả thành công hay thất bại)
  setTimeout(() => {
    window.location.href = "/";
  }, 3000);
}

// ──────────────────────────────────────────
//  RESET VỀ TRẠNG THÁI CHỜ
// ──────────────────────────────────────────
function resetToWait() {
  isScanning = false;
  clearInterval(countdownTimer);

  document.getElementById("result-overlay").classList.remove("show");
  document.getElementById("scan-overlay").style.display = "none";
  document.getElementById("countdown-wrap").classList.remove("visible");
  document.getElementById("capture-btn").classList.remove("visible");

  const ws = document.getElementById("waiting-screen");
  ws.style.display = "flex";
  ws.style.opacity = "0";
  setTimeout(() => { ws.style.opacity = "1"; }, 10);

  setStatus("idle", "Chờ yêu cầu từ két sắt...", "Nhập PIN để bắt đầu");
}

// ──────────────────────────────────────────
//  UI HELPERS
// ──────────────────────────────────────────
function setStatus(type, text, sub) {
  const dot  = document.getElementById("status-dot");
  dot.className = `status-dot ${type}`;
  document.getElementById("status-text").textContent = text;
  document.getElementById("status-sub").textContent  = sub  || "";
}
</script>
</body>
</html>
